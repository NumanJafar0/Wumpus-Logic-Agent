<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python Backend Wumpus Agent</title>
    <style>
        :root { --bg: #1e1e2e; --panel: #282a36; --txt: #f8f8f2; --unk: #6272a4; --safe: #50fa7b; --danger: #ff5555; --vis: #8be9fd; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls, .dashboard { background: var(--panel); padding: 15px 30px; border-radius: 8px; display: flex; gap: 15px; margin-bottom: 20px; width: 100%; max-width: 600px; justify-content: space-between; }
        input { width: 50px; padding: 5px; background: #44475a; color: white; border: none; border-radius: 4px; text-align: center; }
        button { padding: 8px 16px; border: none; border-radius: 4px; background: #bd93f9; color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #44475a; cursor: not-allowed;}
        .metric { font-weight: bold; color: #f1fa8c; font-size: 1.2em; }
        #grid { display: grid; gap: 4px; background: var(--panel); padding: 10px; border-radius: 8px; }
        .cell { width: 60px; height: 60px; background: var(--unk); border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 24px; position: relative; }
        .cell.safe { background: var(--safe); color: black; }
        .cell.danger { background: var(--danger); }
        .cell.visited { background: var(--vis); color: black; }
        .cell-coord { position: absolute; bottom: 2px; right: 2px; font-size: 10px; opacity: 0.6; }
        .status-badge { background: #ff79c6; padding: 5px 10px; border-radius: 4px; font-size: 0.8em; display: none; }
    </style>
</head>
<body>
    <h1>Dynamic Wumpus Agent </h1>
    
    <div class="controls">
        <div>
            <label>R: <input type="number" id="rows" value="4"></label> 
            <label>C: <input type="number" id="cols" value="4"></label>
        </div>
        <button onclick="init()">Generate Env</button>
        <button id="stepBtn" onclick="step()" disabled>Agent Step</button>
        <button id="autoBtn" onclick="toggleAuto()" disabled>Auto Run</button>
        <div id="doneBadge" class="status-badge">Complete!</div>
    </div>

    <div class="dashboard">
        <div>Inference Steps:<br><span class="metric" id="steps">0</span></div>
        <div>Current Percepts:<br><span class="metric" id="percepts">None</span></div>
    </div>

    <div id="grid"></div>

<script>
    let rows = 4, cols = 4;
    let autoInterval = null;

    async function init() {
        rows = document.getElementById('rows').value;
        cols = document.getElementById('cols').value;
        const res = await fetch('/api/init', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rows: rows, cols: cols })
        });
        const data = await res.json();
        
        document.getElementById('stepBtn').disabled = false;
        document.getElementById('autoBtn').disabled = false;
        document.getElementById('doneBadge').style.display = 'none';
        if(autoInterval) toggleAuto();
        
        buildGrid();
        renderState(data);
    }

    async function step() {
        const res = await fetch('/api/step', { method: 'POST' });
        const data = await res.json();
        renderState(data);
        if(data.done) {
            document.getElementById('stepBtn').disabled = true;
            document.getElementById('doneBadge').style.display = 'block';
            if(autoInterval) toggleAuto();
        }
    }

    function buildGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.innerHTML = '';
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                grid.innerHTML += `<div id="cell-${r}_${c}" class="cell"><span class="cell-coord">${r},${c}</span></div>`;
            }
        }
    }

    function renderState(data) {
        document.querySelectorAll('.cell').forEach(c => { 
            c.className = 'cell'; 
            if(c.childNodes.length > 1) c.removeChild(c.firstChild); 
        });

        data.danger_cells.forEach(key => { 
            document.getElementById(`cell-${key}`).classList.add('danger'); 
            document.getElementById(`cell-${key}`).insertAdjacentHTML('afterbegin', '💀');
        });
        data.safe_cells.forEach(key => document.getElementById(`cell-${key}`).classList.add('safe'));
        data.visited.forEach(key => document.getElementById(`cell-${key}`).classList.add('visited'));
        
        let agentCell = document.getElementById(`cell-${data.agent_pos.r}_${data.agent_pos.c}`);
        if(agentCell) agentCell.insertAdjacentHTML('afterbegin', '🕵️');

        document.getElementById('steps').innerText = data.inference_steps.toLocaleString();
        let p = [];
        if(data.percepts.breeze) p.push("Breeze 💨");
        if(data.percepts.stench) p.push("Stench 🤢");
        document.getElementById('percepts').innerText = p.length > 0 ? p.join(" | ") : "None";
    }

    function toggleAuto() {
        let btn = document.getElementById('autoBtn');
        if (autoInterval) { 
            clearInterval(autoInterval); 
            autoInterval = null; 
            btn.innerText = "Auto Run"; 
            btn.style.background = "#bd93f9";
        } else { 
            autoInterval = setInterval(step, 400); 
            btn.innerText = "Stop Auto"; 
            btn.style.background = "#ff5555";
        }
    }

    window.onload = init;
</script>
</body>
</html>
